apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: secure-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: secure-frontend
          ports:
            - containerPort: 80
---
kind: Service
apiVersion: v1
metadata:
  name: frontend-service
  namespace: secure-app
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
