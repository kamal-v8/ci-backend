apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: secure-app
  labels:
    app: backend

spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: secure-backend
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "500m"
              memory: "128Mi"
            requests:
              cpu: "250m"
              memory: "64Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: secure-app

spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
